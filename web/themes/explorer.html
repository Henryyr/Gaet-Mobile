<style>
    :root { --primary: #2d5a27; --accent: #cc5500; --bg: #fffaf0; }
    body { background: var(--bg); color: #2f2a24; font-family: 'Inter', sans-serif; margin: 0; }
    .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; padding: 8rem 1.5rem; text-align: center; color: #fff; }
    .hero h1 { font-size: clamp(2.5rem, 10vw, 4.5rem); text-transform: uppercase; letter-spacing: 4px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 4rem 1.5rem; }
    .split { display: grid; grid-template-columns: 1fr; gap: 3rem; }
    @media(min-width: 800px) { .split { grid-template-columns: 2fr 1fr; } }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 4rem; }
    .tag { background: var(--primary); color: #fff; padding: 1rem; border-radius: 8px; }
</style>
<div class="hero">
    <h1 id="driver-name">Loading...</h1>
    <p id="web-tagline" style="color: #fbbf24; font-weight: 700; font-size: 1.2rem;"></p>
</div>
<div class="container">
    <div class="split">
        <div>
            <h2 style="color: var(--primary);">The Explorer Mission</h2>
            <p id="driver-bio" style="font-size: 1.1rem;"></p>
            <div id="web-services-list" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>
        <div class="tag">
            <p id="driver-location" style="font-weight: 800;"></p>
            <p>Vehicle: <span id="web-vehicle-info"></span></p>
        </div>
    </div>
    <div id="catalog-grid" class="grid"></div>
</div>
