<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SDK Firebase (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Script SAKTI: Otomatis memuat config Firebase dari Hosting -->
    <script src="/__/firebase/init.js"></script>

    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-12">
    <!-- Hero / Profile Section -->
    <header class="gradient-bg text-white py-16 px-6 shadow-2xl text-center">
        <div class="max-w-3xl mx-auto">
            <h1 id="driver-name" class="text-5xl font-extrabold mb-3 tracking-tight">Memuat Nama...</h1>
            <div id="driver-location" class="text-blue-100 text-xl mb-6 flex items-center justify-center gap-2"></div>
            <div class="w-24 h-1 bg-yellow-400 mx-auto mb-6 rounded-full"></div>
            <p id="driver-bio" class="text-xl leading-relaxed text-blue-50 font-light italic"></p>
        </div>
    </header>

    <!-- Catalog Section -->
    <main class="max-w-6xl mx-auto mt-12 px-6">
        <div class="flex items-center justify-between mb-10">
            <h2 class="text-3xl font-bold text-slate-800">Katalog Perjalanan</h2>
            <span class="px-4 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-semibold uppercase tracking-wider">Terbaru</span>
        </div>

        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-slate-500">Mencari petualangan terbaik...</p>
        </div>

        <div id="catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 hidden"></div>
        <div id="empty-state" class="hidden text-center py-20">
            <p class="text-slate-400 text-xl">Belum ada katalog perjalanan saat ini.</p>
        </div>
    </main>

    <script>
        // Tidak perlu inisialisasi manual lagi, sudah dihandle /__/firebase/init.js
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        let userId = urlParams.get('uid');

        if (!userId) {
            const pathParts = window.location.pathname.split('/');
            userId = pathParts[pathParts.length - 1];
        }

        if (userId && userId !== 'index.html') {
            db.collection("users").doc(userId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('driver-name').innerText = `${data.first_name} ${data.last_name}`;
                    document.getElementById('driver-bio').innerText = data.bio || "Siap mengantar Anda ke tujuan terbaik!";
                    document.getElementById('driver-location').innerHTML = `
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span>${data.location || 'Indonesia'}</span>
                    `;
                    document.title = `${data.first_name} - Portofolio Guide`;
                }
            });

            db.collection("catalog").where("userId", "==", userId).get().then((querySnapshot) => {
                const grid = document.getElementById('catalog-grid');
                const loading = document.getElementById('loading-state');
                const empty = document.getElementById('empty-state');
                loading.classList.add('hidden');

                if (querySnapshot.empty) {
                    empty.classList.remove('hidden');
                    return;
                }

                grid.classList.remove('hidden');
                querySnapshot.forEach((doc) => {
                    const item = doc.data();
                    const formattedPrice = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(item.price);
                    grid.innerHTML += `
                        <div class="bg-white rounded-3xl shadow-xl overflow-hidden group transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl">
                            <div class="relative overflow-hidden">
                                <img src="data:image/jpeg;base64,${item.imageBase64}" class="w-full h-64 object-cover transform transition duration-500 group-hover:scale-110">
                                <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full shadow-sm">
                                    <p class="text-blue-600 font-bold text-sm">${formattedPrice}</p>
                                </div>
                            </div>
                            <div class="p-8">
                                <h3 class="text-2xl font-bold text-slate-900 mb-3 group-hover:text-blue-600 transition-colors">${item.title || 'Petualangan Seru'}</h3>
                                <p class="text-slate-500 leading-relaxed line-clamp-3">${item.description || 'Layanan guide terbaik.'}</p>
                                <button class="mt-6 w-full py-3 bg-slate-900 text-white rounded-xl font-semibold hover:bg-blue-600 transition-colors">Lihat Detail</button>
                            </div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
